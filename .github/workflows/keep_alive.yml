name: Keep Alive Bot

on:
  schedule:
    # Каждые 12 минут (cron: минута, час, день, месяц, день_недели)
    - cron: '*/12 * * * *'
  workflow_dispatch:  # позволяет запустить вручную

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot health endpoint
        run: |
          curl -I -s -o /dev/null -w "%{http_code}\n" https://mashagpt.onrender.com/health
